<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Open browser console and run the script below to generate icons, then save them as PNG files.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>

<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const r = size * 0.15;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#8b5cf6');

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.arcTo(size, 0, size, r, r);
  ctx.lineTo(size, size - r);
  ctx.arcTo(size, size, size - r, size, r);
  ctx.lineTo(r, size);
  ctx.arcTo(0, size, 0, size - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.fillStyle = grad;
  ctx.fill();

  // Magnifier icon
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = size * 0.1;
  ctx.lineCap = 'round';
  const cx = size * 0.42, cy = size * 0.42, cr = size * 0.22;
  ctx.beginPath();
  ctx.arc(cx, cy, cr, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + cr * 0.7, cy + cr * 0.7);
  ctx.lineTo(size * 0.82, size * 0.82);
  ctx.stroke();
}

['c16','c48','c128'].forEach((id, i) => {
  drawIcon(id, [16, 48, 128][i]);
  // Right-click canvas → Save image as icon16.png, icon48.png, icon128.png
});
</script>
</body>
</html>
