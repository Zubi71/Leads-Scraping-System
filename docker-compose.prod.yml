version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ai_leads_net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    networks:
      - ai_leads_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    restart: always
    networks:
      - ai_leads_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: ./backend/.env.prod
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=8
    restart: always
    networks:
      - ai_leads_net

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: ./backend/.env.prod
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=warning --scheduler redbeat.RedBeatScheduler
    restart: always
    networks:
      - ai_leads_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    networks:
      - ai_leads_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - ai_leads_net

volumes:
  postgres_data:
  redis_data:

networks:
  ai_leads_net:
    driver: bridge
